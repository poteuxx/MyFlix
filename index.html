<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MyFlix • Cinema Hub</title>

<style>
:root{
  --bg:#0b1020;
  --panel:#0f1a33;
  --blue:#2f7bff;
  --blue2:#00c2ff;
  --text:#ffffff;
  --muted:#9bb0d1;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* HEADER */
header{
  padding:22px;
  text-align:center;
  font-size:32px;
  font-weight:bold;
  letter-spacing:1px;
  background:linear-gradient(90deg,#06102a,#0a1b3f);
  color:var(--blue2);
  box-shadow:0 0 25px rgba(47,123,255,0.3);
  animation:slideDown 0.8s ease;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:12px;
  background:#071022;
}

.tab{
  padding:10px 18px;
  border-radius:12px;
  cursor:pointer;
  background:#0f1a33;
  color:var(--muted);
  transition:0.3s;
  border:1px solid transparent;
}

.tab:hover{
  transform:scale(1.05);
  border:1px solid var(--blue);
  color:white;
}

.tab.active{
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  color:white;
  box-shadow:0 0 15px rgba(47,123,255,0.6);
}

/* PLAYER */
.player{
  height:60vh;
  margin:15px;
  border-radius:18px;
  overflow:hidden;
  background:black;
  box-shadow:0 0 30px rgba(47,123,255,0.2);
  animation:fadeIn 0.8s ease;
}

.player iframe,
.player video{
  width:100%;
  height:100%;
  border:none;
}

/* GRID */
.section{
  display:none;
  padding:10px 20px;
}

.section.active{
  display:block;
  animation:fadeIn 0.5s ease;
}

.grid{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:10px;
}

/* CARD */
.card{
  min-width:180px;
  background:var(--panel);
  border-radius:14px;
  cursor:pointer;
  transition:0.3s;
  flex-shrink:0;
  border:1px solid rgba(47,123,255,0.2);
  overflow:hidden;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(47,123,255,0.6);
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.card p{
  text-align:center;
  font-size:13px;
  margin:8px;
  color:white;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes slideDown{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

/* SCROLLBAR */
.grid::-webkit-scrollbar{
  height:6px;
}
.grid::-webkit-scrollbar-thumb{
  background:var(--blue);
  border-radius:10px;
}
</style>
</head>

<body>

<header>🔵 BlueFlix Cinema Hub</header>

<div class="tabs">
  <div class="tab active" data="classics">Classiques</div>
  <div class="tab" data="horror">Horreur</div>
  <div class="tab" data="scifi">Sci-Fi</div>
  <div class="tab" data="action">Action</div>
  <div class="tab" data="comedy">Comédie</div>
  <div class="tab" data="documentary">Docs</div>
</div>

<div class="player" id="playerBox">
  <iframe id="player" src=""></iframe>
</div>

<!-- SECTIONS -->
<div id="classics" class="section active"><div class="grid"></div></div>
<div id="horror" class="section"><div class="grid"></div></div>
<div id="scifi" class="section"><div class="grid"></div></div>
<div id="action" class="section"><div class="grid"></div></div>
<div id="comedy" class="section"><div class="grid"></div></div>
<div id="documentary" class="section"><div class="grid"></div></div>

<script>

/* 🎬 FILMS (SAFE + WORKING via Archive Embed) */
const films = {
horror: [
  {id:"nosferatu", title:"Nosferatu (1922)"},
  {id:"night_of_the_living_dead", title:"Night of the Living Dead"},
  {id:"carnival_of_souls", title:"Carnival of Souls"}
],

scifi: [
  {id:"plan_9_from_outer_space", title:"Plan 9 From Outer Space"},
  {id:"first_spaceship_on_venus", title:"First Spaceship on Venus"}
],

action: [
  {id:"stagecoach", title:"Stagecoach"},
  {id:"ride_lonesome", title:"Ride Lonesome"}
],

comedy: [
  {id:"the_kid", title:"The Kid"},
  {id:"steamboat_bill_jr", title:"Steamboat Bill Jr"}
],

documentary: [
  {id:"apollo_11", title:"Apollo 11"},
  {id:"ww2_documentary", title:"WW2 Documentary"}
],

classics: [
  {id:"the_gold_rush", title:"The Gold Rush"},
  {id:"metropolis", title:"Metropolis"}
]
};

/* ▶️ PLAYER PRO (NO MIME BUG) */
function playMedia(f){
  document.getElementById("playerBox").innerHTML = `
    <iframe
      src="https://archive.org/embed/${f.id}"
      allowfullscreen>
    </iframe>
  `;
}

/* 📦 POPULATE */
function populate(){
  for(let cat in films){
    const grid = document.getElementById(cat).querySelector(".grid");

    films[cat].forEach(f=>{
      const card = document.createElement("div");
      card.className="card";

      const img = "https://via.placeholder.com/300x170/0a1b3f/ffffff?text=" + encodeURIComponent(f.title);

      card.innerHTML = `
        <img src="${img}">
        <p>${f.title}</p>
      `;

      card.onclick = ()=> playMedia(f);

      grid.appendChild(card);
    });
  }
}

populate();

/* 🧭 TABS */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(t.getAttribute("data")).classList.add("active");
  };
});

</script>

</body>
</html>
