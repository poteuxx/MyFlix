<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyFlix • Free Movies</title>
<style>
body { margin:0; font-family:Arial, sans-serif; background:#141414; color:white; transition:0.3s; }
header { padding:20px; font-size:32px; font-weight:bold; text-align:center; background:#000; color:#E50914; display:flex; justify-content:space-between; align-items:center; }
button { cursor:pointer; background:#E50914; border:none; color:white; padding:5px 10px; border-radius:6px; transition:0.3s; }
button:hover { background:#FF1A30; }
.tabs { display:flex; justify-content:center; margin-top:10px; }
.tab { padding:10px 20px; margin:0 5px; cursor:pointer; border-radius:6px; transition:0.3s; background:#222; }
.tab.active { background:#E50914; color:white; }
.section { display:none; padding:20px; }
.section.active { display:block; animation:fadeIn 0.5s; }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
.grid { display:flex; overflow-x:auto; gap:15px; padding:10px; }
.card { min-width:160px; cursor:pointer; transition:0.3s; border-radius:10px; background:#222; padding:5px; }
.card img { width:100%; border-radius:10px; }
.card:hover { transform:scale(1.05); }
.player { width:100%; height:60vh; background:black; margin-top:10px; }
.player iframe { width:100%; height:100%; border:none; border-radius:10px; }
</style>
</head>
<body>

<header>
  MyFlix
  <button id="langBtn">FR</button>
</header>

<div class="tabs">
  <div class="tab active" data-section="action">Action</div>
  <div class="tab" data-section="comedy">Comedy</div>
  <div class="tab" data-section="horror">Horror</div>
  <div class="tab" data-section="classics">Classics</div>
  <div class="tab" data-section="family">Family</div>
  <div class="tab" data-section="docs">Documentaries</div>
  <div class="tab" data-section="settings">Settings</div>
</div>

<div class="player">
  <iframe id="videoPlayer"></iframe>
</div>

<!-- Sections -->
<div id="action" class="section active"></div>
<div id="comedy" class="section"></div>
<div id="horror" class="section"></div>
<div id="classics" class="section"></div>
<div id="family" class="section"></div>
<div id="docs" class="section"></div>
<div id="settings" class="section">
  <h2>Settings</h2>
  <p>Language toggle and future options.</p>
</div>

<script>
// Film lists (embedable public domain / legal films)
const films = {
  en: {
    action:[
      {id:"xQ1iG4Uc9ew", title:"Classic Action 1"},
      {id:"98UgQ8Q0gXk", title:"Classic Action 2"},
      {id:"pGQV5O_1QYs", title:"Space Adventure"}
    ],
    comedy:[
      {id:"ko6Z2zLd7Tw", title:"Funny Classic"},
      {id:"j9d5ldfz0rU", title:"Slapstick Comedy"}
    ],
    horror:[
      {id:"qyYHWkVWQ4o", title:"Horror Night"},
      {id:"UNk_Wu9K2fQ", title:"Classic Scare"}
    ],
    classics:[
      {id:"Hh0X4Q9h1nE", title:"Night of the Living Dead"},
      {id:"f5r4JY0z2lQ", title:"The General"}
    ],
    family:[
      {id:"d4C7e7cY3gQ", title:"His Girl Friday"},
      {id:"mYQv6rV4dM8", title:"Sherlock Holmes"}
    ],
    docs:[
      {id:"PLw5hg4g6JdQ", title:"Documentary Compilation"}
    ]
  },
  fr: {
    action:[
      {id:"xQ1iG4Uc9ew", title:"Action Classique 1"},
      {id:"98UgQ8Q0gXk", title:"Action Classique 2"},
      {id:"pGQV5O_1QYs", title:"Aventure Spatiale"}
    ],
    comedy:[
      {id:"ko6Z2zLd7Tw", title:"Comédie Drôle"},
      {id:"j9d5ldfz0rU", title:"Comédie Burlesque"}
    ],
    horror:[
      {id:"qyYHWkVWQ4o", title:"Nuit d'Horreur"},
      {id:"UNk_Wu9K2fQ", title:"Frayeur Classique"}
    ],
    classics:[
      {id:"Hh0X4Q9h1nE", title:"La Nuit des morts-vivants"},
      {id:"f5r4JY0z2lQ", title:"Le Général"}
    ],
    family:[
      {id:"d4C7e7cY3gQ", title:"Sa Petite Amie"},
      {id:"mYQv6rV4dM8", title:"Sherlock Holmes"}
    ],
    docs:[
      {id:"PLw5hg4g6JdQ", title:"Compilation Documentaire"}
    ]
  }
};

let currentLang="en";

// Initialize sections
function renderFilms() {
  for(const section in films[currentLang]){
    const container=document.getElementById(section);
    container.innerHTML="";
    films[currentLang][section].forEach(f=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`<img src="https://img.youtube.com/vi/${f.id}/0.jpg"><p>${f.title}</p>`;
      div.onclick=()=>{document.getElementById("videoPlayer").src=`https://www.youtube.com/embed/${f.id}?autoplay=1`;}
      container.appendChild(div);
    });
  }
}

renderFilms();

// Tabs
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    const sectionId=tab.dataset.section;
    document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(sectionId).classList.add("active");
  });
});

// Language toggle
document.getElementById("langBtn").addEventListener("click", ()=>{
  currentLang=currentLang==="en"?"fr":"en";
  document.getElementById("langBtn").textContent=currentLang==="en"?"FR":"EN";
  renderFilms();
});
</script>
</body>
</html>
