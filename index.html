<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MyFlix • Films Longs</title>

<style>
body { margin:0; font-family:Arial,sans-serif; background:#141414; color:white; }

header {
  background:#000;
  padding:20px;
  font-size:30px;
  text-align:center;
  color:#E50914;
  letter-spacing:1px;
}

.tabs {
  display:flex;
  justify-content:center;
  background:#222;
  padding:10px;
  gap:6px;
  flex-wrap:wrap;
}

.tab {
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  background:#333;
  transition:0.3s;
  font-weight:bold;
}

.tab.active {
  background:#E50914;
  color:white;
}

.section { display:none; padding:15px; }
.section.active { display:block; animation:fadeIn 0.5s ease; }

@keyframes fadeIn {
  from {opacity:0; transform:translateY(15px);}
  to {opacity:1; transform:translateY(0);}
}

.grid {
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:8px;
}

.card {
  min-width:180px;
  background:#222;
  border-radius:12px;
  cursor:pointer;
  text-align:center;
  transition:0.3s;
  flex-shrink:0;
}

.card:hover {
  transform:scale(1.08);
  box-shadow:0 0 15px #E50914;
}

.card img {
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:12px;
}

.card p {
  margin:6px 0;
  font-size:14px;
  font-weight:bold;
}

.player {
  width:100%;
  height:65vh;
  background:black;
  margin-top:12px;
  border-radius:12px;
  overflow:hidden;
  display:flex;
}

.player video,
.player iframe {
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<header>MyFlix 🎬 Longs Métrages</header>

<div class="tabs">
  <div class="tab active" data="classics">Classiques</div>
  <div class="tab" data="horror">Horreur</div>
  <div class="tab" data="scifi">Sci-Fi</div>
  <div class="tab" data="action">Action</div>
  <div class="tab" data="comedy">Comédie</div>
  <div class="tab" data="documentary">Documentaires</div>
</div>

<div class="player" id="playerBox">
  <video id="player" controls autoplay></video>
</div>

<!-- SECTIONS -->
<div id="classics" class="section active"><div class="grid"></div></div>
<div id="horror" class="section"><div class="grid"></div></div>
<div id="scifi" class="section"><div class="grid"></div></div>
<div id="action" class="section"><div class="grid"></div></div>
<div id="comedy" class="section"><div class="grid"></div></div>
<div id="documentary" class="section"><div class="grid"></div></div>

<script>

// 🎬 FILMS
const films = {
classics: [
  {type:"video", id:"https://archive.org/download/TheGoldRush1925/TheGoldRush1925_512kb.mp4", title:"The Gold Rush (1925)"},
  {type:"video", id:"https://archive.org/download/Metropolis_1927/Metropolis_1927_512kb.mp4", title:"Metropolis (1927)"},
  {type:"video", id:"https://archive.org/download/TheGeneral1926/TheGeneral1926_512kb.mp4", title:"The General (1926)"},
  {type:"video", id:"https://archive.org/download/Detour/Detour_512kb.mp4", title:"Detour (1945)"}
],

horror: [
  {type:"video", id:"https://archive.org/download/NightOfTheLivingDead_201512/NightOfTheLivingDead_512kb.mp4", title:"Night of the Living Dead"},
  {type:"video", id:"https://archive.org/download/Nosferatu1922/Nosferatu1922_512kb.mp4", title:"Nosferatu"},
  {type:"video", id:"https://archive.org/download/CarnivalOfSouls_1962/CarnivalOfSouls_512kb.mp4", title:"Carnival of Souls"}
],

scifi: [
  {type:"video", id:"https://archive.org/download/Plan9FromOuterSpace/Plan9FromOuterSpace_512kb.mp4", title:"Plan 9 From Outer Space"},
  {type:"video", id:"https://archive.org/download/FirstSpaceshipOnVenus/FirstSpaceshipOnVenus_512kb.mp4", title:"First Spaceship on Venus"}
],

action: [
  {type:"video", id:"https://archive.org/download/Stagecoach1939/Stagecoach1939_512kb.mp4", title:"Stagecoach"},
  {type:"video", id:"https://archive.org/download/RideLonesome/RideLonesome_512kb.mp4", title:"Ride Lonesome"}
],

comedy: [
  {type:"video", id:"https://archive.org/download/TheKid1921/TheKid1921_512kb.mp4", title:"The Kid"},
  {type:"video", id:"https://archive.org/download/SteamboatBillJr/SteamboatBillJr_512kb.mp4", title:"Steamboat Bill Jr"}
],

documentary: [
  {type:"video", id:"https://archive.org/download/Apollo11/Apollo11_512kb.mp4", title:"Apollo 11"},
  {type:"video", id:"https://archive.org/download/WW2Documentary/WW2Documentary_512kb.mp4", title:"WW2 Documentary"}
]
};

// 🎯 PLAYER STABLE (PLUS DE BUG)
function playMedia(f){
  const box = document.getElementById("playerBox");

  if(f.type === "video"){
    box.innerHTML = `
      <video controls autoplay>
        <source src="${f.id}" type="video/mp4">
      </video>
    `;
  }

  if(f.type === "embed"){
    box.innerHTML = `<iframe src="${f.id}" allowfullscreen></iframe>`;
  }

  if(f.type === "link"){
    window.open(f.id, "_blank");
  }
}

// 🧩 POPULATE AVEC IMAGES STABLES
function populate(){
  for(let cat in films){
    const grid = document.getElementById(cat).querySelector(".grid");

    films[cat].forEach(f=>{
      const card = document.createElement("div");
      card.className="card";

      // image stable (pas SVG bug)
      const img = "https://via.placeholder.com/300x170/000000/ffffff?text=MyFlix";

      card.innerHTML = `
        <img src="${img}">
        <p>${f.title}</p>
      `;

      card.onclick = ()=> playMedia(f);

      grid.appendChild(card);
    });
  }
}

populate();

// 🧭 TABS FIX
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(t.getAttribute("data")).classList.add("active");
  };
});

</script>

</body>
</html>
