<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyFlix • Free YouTube Movies</title>
<style>
body {
  margin: 0;
  background: #141414;
  font-family: Arial, sans-serif;
  color: #fff;
}
header {
  padding: 20px;
  font-size: 32px;
  font-weight: bold;
  text-align: center;
  background: #000;
  color: #E50914;
}
.player {
  width: 100%;
  height: 60vh;
  background: #000;
}
.player iframe {
  width: 100%;
  height: 100%;
  border: none;
}
.section {
  margin: 30px;
}
.section h2 {
  font-size: 24px;
  margin-bottom: 10px;
}
.grid {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 10px;
}
.card {
  min-width: 160px;
  cursor: pointer;
  transition: 0.2s ease;
}
.card img {
  width: 100%;
  border-radius: 6px;
}
.card:hover {
  transform: scale(1.1);
}
</style>
</head>
<body>

<header>MyFlix • Free YouTube Movies</header>

<div class="player"><iframe id="videoPlayer"></iframe></div>

<!-- Movie Sections -->
<div class="section">
  <h2>Movie Central • Drama & Classics</h2>
  <div class="grid">
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/xQ1iG4Uc9ew')">
      <img src="https://img.youtube.com/vi/xQ1iG4Uc9ew/0.jpg" alt="Movie Poster">
      <p>Classic Feature</p>
    </div>
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/98UgQ8Q0gXk')">
      <img src="https://img.youtube.com/vi/98UgQ8Q0gXk/0.jpg" alt="Movie Poster">
      <p>Adventure Film</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Horror Central • Creepy Movies</h2>
  <div class="grid">
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/qyYHWkVWQ4o')">
      <img src="https://img.youtube.com/vi/qyYHWkVWQ4o/0.jpg" alt="Horror Movie">
      <p>Horror Night</p>
    </div>
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/UNk_Wu9K2fQ')">
      <img src="https://img.youtube.com/vi/UNk_Wu9K2fQ/0.jpg" alt="Horror Classic">
      <p>Classic Scare</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>PizzaFlix • Indie & Cult Films</h2>
  <div class="grid">
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/ko6Z2zLd7Tw')">
      <img src="https://img.youtube.com/vi/ko6Z2zLd7Tw/0.jpg" alt="Film">
      <p>Golden Age Feature</p>
    </div>
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/j9d5ldfz0rU')">
      <img src="https://img.youtube.com/vi/j9d5ldfz0rU/0.jpg" alt="Film">
      <p>Cult Classic</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Sci‑Fi Central • Classics & B Movies</h2>
  <div class="grid">
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/pGQV5O_1QYs')">
      <img src="https://img.youtube.com/vi/pGQV5O_1QYs/0.jpg" alt="Sci‑Fi">
      <p>Space Adventure</p>
    </div>
    <div class="card" onclick="playVideo('https://www.youtube.com/embed/0pCjWyF4z8E')">
      <img src="https://img.youtube.com/vi/0pCjWyF4z8E/0.jpg" alt="Sci‑Fi Classic">
      <p>Sci‑Fi Classic</p>
    </div>
  </div>
</div>

<script>
function playVideo(url) {
  document.getElementById("videoPlayer").src = url + "?autoplay=1";
}
</script>

</body>
</html>
