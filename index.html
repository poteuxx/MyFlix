<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BlueFlix • Cinema Hub</title>

<style>
:root{
  --bg:#0b1020;
  --panel:#0f1a33;
  --blue:#2f7bff;
  --blue2:#00c2ff;
  --text:#ffffff;
  --muted:#9bb0d1;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:22px;
  text-align:center;
  font-size:32px;
  font-weight:bold;
  background:linear-gradient(90deg,#06102a,#0a1b3f);
  color:var(--blue2);
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:12px;
  background:#071022;
}

.tab{
  padding:10px 18px;
  border-radius:12px;
  cursor:pointer;
  background:#0f1a33;
  color:var(--muted);
  transition:0.3s;
}

.tab:hover{
  transform:scale(1.05);
  color:white;
}

.tab.active{
  background:linear-gradient(90deg,var(--blue),var(--blue2));
  color:white;
}

/* PLAYER */
.player{
  height:60vh;
  margin:15px;
  border-radius:16px;
  overflow:hidden;
  background:black;
}

.player iframe{
  width:100%;
  height:100%;
  border:none;
}

/* GRID */
.section{
  display:none;
  padding:10px 20px;
}

.section.active{
  display:block;
}

.grid{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:10px;
}

/* CARD */
.card{
  min-width:180px;
  background:var(--panel);
  border-radius:14px;
  cursor:pointer;
  transition:0.3s;
  overflow:hidden;
}

.card:hover{
  transform:scale(1.07);
  box-shadow:0 0 20px rgba(47,123,255,0.5);
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.card p{
  text-align:center;
  margin:8px;
  font-size:13px;
}
</style>
</head>

<body>

<header>🔵 BlueFlix Cinema Hub</header>

<div class="tabs">
  <div class="tab active" data="classics">Classiques</div>
  <div class="tab" data="horror">Horreur</div>
  <div class="tab" data="scifi">Sci-Fi</div>
  <div class="tab" data="action">Action</div>
  <div class="tab" data="comedy">Comédie</div>
  <div class="tab" data="documentary">Docs</div>
</div>

<div class="player" id="playerBox">
  <iframe id="player"></iframe>
</div>

<!-- SECTIONS -->
<div id="classics" class="section active"><div class="grid"></div></div>
<div id="horror" class="section"><div class="grid"></div></div>
<div id="scifi" class="section"><div class="grid"></div></div>
<div id="action" class="section"><div class="grid"></div></div>
<div id="comedy" class="section"><div class="grid"></div></div>
<div id="documentary" class="section"><div class="grid"></div></div>

<script>

/* 🎬 FILMS STABLES (IDs VALIDES ARCHIVE EMBED) */
const films = {
classics: [
  {id:"thegoldrush1925", title:"The Gold Rush"},
  {id:"metropolis", title:"Metropolis"},
  {id:"thegeneral1926", title:"The General"}
],

horror: [
  {id:"nosferatu", title:"Nosferatu"},
  {id:"night_of_the_living_dead", title:"Night of the Living Dead"},
  {id:"carnival_of_souls", title:"Carnival of Souls"}
],

scifi: [
  {id:"plan_9_from_outer_space", title:"Plan 9 From Outer Space"},
  {id:"first_spaceship_on_venus", title:"First Spaceship on Venus"}
],

action: [
  {id:"stagecoach1939", title:"Stagecoach"},
  {id:"ridelonesome", title:"Ride Lonesome"}
],

comedy: [
  {id:"thekid1921", title:"The Kid"},
  {id:"steamboat_bill_jr", title:"Steamboat Bill Jr"}
],

documentary: [
  {id:"apollo11", title:"Apollo 11"},
  {id:"ww2documentary", title:"WW2 Documentary"}
]
};

/* ▶️ PLAYER FIX (ANTI BUG + FALLBACK) */
function playMedia(f){
  const url = `https://archive.org/embed/${f.id}`;

  document.getElementById("playerBox").innerHTML = `
    <iframe
      src="${url}"
      allowfullscreen>
    </iframe>
  `;
}

/* 🖼 IMAGE FIX (TOUJOURS OK) */
function thumb(title){
  return `https://via.placeholder.com/300x170/0b1b3a/ffffff?text=${encodeURIComponent(title)}`;
}

/* 📦 POPULATE */
function populate(){
  for(let cat in films){
    const grid = document.getElementById(cat).querySelector(".grid");

    films[cat].forEach(f=>{
      const card = document.createElement("div");
      card.className="card";

      card.innerHTML = `
        <img src="${thumb(f.title)}">
        <p>${f.title}</p>
      `;

      card.onclick = ()=> playMedia(f);

      grid.appendChild(card);
    });
  }
}

populate();

/* 🧭 TABS */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(t.getAttribute("data")).classList.add("active");
  };
});

</script>

</body>
</html>
